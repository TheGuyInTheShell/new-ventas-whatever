<div class="group bg-base-100 border border-base-300 p-6 rounded-2xl hover-lift shadow-sm flex flex-col gap-4">
    <div class="flex items-center justify-between">
        <div class="p-2.5 rounded-xl bg-primary/10 text-primary ring-1 ring-primary/20 group-hover:bg-primary group-hover:text-white group-hover:shadow-glow group-hover:scale-110 transition-premium duration-500">
            <i data-lucide="{{ icon }}" class="size-5"></i>
        </div>
        {% if variation is defined %}
        <div class="px-2 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wider {{ 'bg-success/20 text-success' if variation > 0 else 'bg-error/20 text-error' }} ring-1 {{ 'ring-success/30' if variation > 0 else 'ring-error/30' }}">
            {{ '+' if variation > 0 }}{{ variation }}%
        </div>
        {% endif %}
    </div>
    <div>
        <h3 class="text-[10px] font-bold text-base-content/50 uppercase tracking-[0.2em] mb-1">{{ title }}</h3>
        <p class="text-2xl font-bold text-base-content">{{ value }}</p>
    </div>
</div>
