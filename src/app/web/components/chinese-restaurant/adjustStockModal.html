<!-- Adjust Stock Modal -->
<div x-cloak x-show="adjustModalOpen" x-transition.opacity.duration.200ms x-trap.inert.noscroll="adjustModalOpen"
    x-on:keydown.esc.window="closeAdjustModal" x-on:click.self="closeAdjustModal"
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4 pb-8 backdrop-blur-md sm:items-center lg:p-8"
    role="dialog" aria-modal="true" aria-labelledby="adjustModalTitle">

    <!-- Modal Dialog -->
    <div x-show="adjustModalOpen"
        x-transition:enter="transition ease-out duration-200 delay-100 motion-reduce:transition-opacity"
        x-transition:enter-start="opacity-0 scale-95 translate-y-4 sm:translate-y-0 sm:scale-95"
        x-transition:enter-end="opacity-100 scale-100 translate-y-0"
        class="flex w-full max-w-md flex-col overflow-hidden rounded-2xl border border-base-300 bg-base-100 text-base-content shadow-2xl">

        <!-- Dialog Header -->
        <div class="flex items-center justify-between border-b border-base-200 bg-base-200/50 px-6 py-4">
            <h3 id="adjustModalTitle" class="font-bold text-lg flex items-center gap-3">
                <div class="flex items-center justify-center w-10 h-10 rounded-lg bg-primary/10 text-primary">
                    <i data-lucide="arrow-right-left" class="w-5 h-5"></i>
                </div>
                <div class="flex flex-col">
                    <span>Adjust Stock</span>
                    <span class="text-xs font-normal text-base-content/60"
                        x-text="adjustItem?.name || 'Inventory Item'"></span>
                </div>
            </h3>
            <button type="button" @click="closeAdjustModal" aria-label="close modal"
                class="btn btn-sm btn-circle btn-ghost text-base-content/70 hover:bg-base-300 hover:text-base-content">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" stroke="currentColor"
                    fill="none" stroke-width="1.4" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Dialog Body -->
        <form @submit.prevent="adjustStockSubmit" class="flex flex-col gap-5 px-6 py-5">
            
            <div class="form-control">
                <label class="label pt-0"><span class="label-text font-semibold">New Quantity <span
                            class="text-error">*</span></span></label>
                <div class="join w-full">
                    <input type="number" step="0.01" x-model.number="adjustFormData.new_quantity" 
                        class="input input-bordered join-item w-full focus:input-primary focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all bg-base-100 h-11"
                        required />
                    <span class="join-item btn btn-outline pointer-events-none" x-text="adjustItem?.expression || 'unit'"></span>
                </div>
            </div>

            <div class="flex items-start gap-4 pt-1">
                <input type="checkbox" class="toggle toggle-primary toggle-lg mt-1" x-model="adjustFormData.is_adjustment" />
                <div class="flex flex-col">
                    <span class="text-sm font-semibold">Log as Adjustment</span>
                    <span class="text-xs text-base-content/60 leading-relaxed" x-text="adjustFormData.is_adjustment ? 'Implicitly creates an Invoice & Transaction for accounting.' : 'Directly rewrites the balance (for fixing initial setup errors).'"></span>
                </div>
            </div>

            <div class="form-control" x-show="adjustFormData.is_adjustment" x-collapse>
                <label class="label pt-0"><span class="label-text font-semibold">Reason/Notes (Optional)</span></label>
                <textarea x-model="adjustFormData.notes" placeholder="e.g. Found spare box in back..."
                    class="textarea textarea-bordered w-full focus:textarea-primary focus:outline-none focus:ring-2 focus:ring-primary/20 bg-base-100 resize-none h-24"></textarea>
            </div>

            <!-- Dialog Footer -->
            <div class="flex flex-col-reverse justify-between gap-3 border-t border-base-200 bg-base-200/50 px-6 py-4 -mx-6 -mb-5 sm:flex-row sm:items-center md:justify-end mt-2">
                <button type="button" @click="closeAdjustModal"
                    class="btn btn-ghost px-6 font-medium text-base-content/80" :disabled="isAdjusting">Cancel</button>
                <button type="submit" class="btn btn-primary px-8 shadow-lg shadow-primary/20 font-medium"
                    :disabled="isAdjusting">
                    <span x-show="isAdjusting" class="loading loading-spinner loading-sm" x-cloak></span>
                    <span x-show="!isAdjusting" class="flex items-center gap-2">
                        <i data-lucide="check" class="w-4 h-4"></i> Save Change
                    </span>
                </button>
            </div>
        </form>
    </div>
</div>
