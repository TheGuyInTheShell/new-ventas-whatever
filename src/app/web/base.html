<!doctype html>
<html {{ _injectable.html.attrs }}>

<head {{ _injectable.head.attrs }}>
  {{ _injectable.head.styles | safe }} {{ _injectable.head.metas | safe }} {{
  _injectable.head.scripts | safe }} {{ _injectable.head.links | safe }}
</head>

<body {{ _injectable.body.attrs }} x-data>
  {{ _injectable.body.scripts_before | safe }}
  {% block page %}{% endblock %}
  {{ _injectable.body.scripts_after | safe }}
</body>

</html>
