{% extends "pages/settings/layout.html" %}

{% block settings_content %}
<div x-data="{
    state: {
        email: true,
        desktop: false,
        product_updates: true,
        weekly_digest: false,
        important_updates: true
    },
    sections: [
        {
            title: 'Notification channels',
            description: 'Where can we notify you?',
            fields: [
                { name: 'email', label: 'Email', description: 'Receive a daily email digest.' },
                { name: 'desktop', label: 'Desktop', description: 'Receive desktop notifications.' }
            ]
        },
        {
            title: 'Account updates',
            description: 'Receive updates.',
            fields: [
                { name: 'weekly_digest', label: 'Weekly digest', description: 'Receive a weekly digest of news.' },
                { name: 'product_updates', label: 'Product updates', description: 'Receive a monthly email with all new features and updates.' },
                { name: 'important_updates', label: 'Important updates', description: 'Receive emails about important updates like security fixes, maintenance, etc.' }
            ]
        }
    ],
    onChange() {
        console.log('State updated:', JSON.parse(JSON.stringify(this.state)));
    }
}">
    <template x-for="(section, index) in sections" :key="index">
        <div class="mb-8">
            <!-- Section Title -->
            <div class="mb-4 px-2">
                <h3 class="text-base font-medium" x-text="section.title"></h3>
                <p class="text-xs text-base-content/60" x-text="section.description"></p>
            </div>

            <!-- Fields -->
            <div class="card bg-base-100 border border-base-300 shadow-sm">
                <div class="flex flex-col divide-y divide-base-300">
                    <template x-for="field in section.fields" :key="field.name">
                        <div class="p-4 flex items-center justify-between gap-4">
                            <div>
                                <label class="font-medium text-sm" x-text="field.label"></label>
                                <p class="text-xs text-base-content/60 mt-1" x-text="field.description"></p>
                            </div>
                            <input type="checkbox" class="toggle toggle-primary toggle-sm" 
                                   x-model="state[field.name]" 
                                   @change="onChange" />
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </template>
</div>
{% endblock %}
