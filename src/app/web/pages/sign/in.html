{% extends "base.html" %} {% block page %}

<div>
    <h1>Sign In</h1>
    <form hx-post="/partials/sign/in" hx-target="this">
        <input type="text" name="username" placeholder="Username" required x-mask="9999999999">
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
    </form>
</div>

{% endblock %}
