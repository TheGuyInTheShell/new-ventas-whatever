{% extends "layouts/panel.html" %}

{% block content %}
<div x-data="chineseRestaurantTables({{ tables | tojson }})" class="space-y-6">

    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-base-content">Table Management</h1>
            <p class="text-sm text-base-content/60">Live overview of restaurant floor</p>
        </div>
        <div class="flex gap-2">
            <div class="flex items-center gap-2 px-3 py-1 bg-success/10 text-success rounded-full text-xs font-bold border border-success/10">
                <span class="w-2 h-2 rounded-full bg-success"></span> Available
            </div>
            <div class="flex items-center gap-2 px-3 py-1 bg-error/10 text-error rounded-full text-xs font-bold border border-error/10">
                <span class="w-2 h-2 rounded-full bg-error"></span> Occupied
            </div>
        </div>
    </div>

    <!-- Table Grid -->
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-6">
        <template x-for="table in tables" :key="table.id">
            <div class="group relative bg-base-100 rounded-[2rem] border border-base-300 p-6 flex flex-col items-center justify-center gap-4 transition-premium hover:shadow-2xl hover:shadow-primary/5 hover:border-primary/30 cursor-pointer overflow-hidden">
                
                <!-- Status Badge -->
                <div class="absolute top-4 right-4 flex items-center gap-1.5 px-2 py-1 rounded-full text-[10px] font-bold border uppercase tracking-wider" 
                     :class="getStatusClass(table.status)">
                    <span class="w-1.5 h-1.5 rounded-full" :class="getStatusDot(table.status)"></span>
                    <span x-text="table.status"></span>
                </div>

                <!-- Table Graphic -->
                <div class="w-24 h-24 rounded-full bg-base-200 border-4 border-base-300 flex items-center justify-center transition-premium group-hover:scale-110 group-hover:rotate-12 group-hover:border-primary/20 relative">
                    <span class="text-2xl font-black text-base-content/40 group-hover:text-primary transition-colors" x-text="table.number"></span>
                    
                    <!-- Seats -->
                    <template x-for="i in Array.from({length: table.capacity})" :key="i">
                        <div class="absolute w-4 h-4 rounded-full bg-base-300 border border-base-100 shadow-sm transition-premium group-hover:bg-primary/20"
                             :style="`transform: rotate(${(360/table.capacity)*i}deg) translateY(-60px)`"></div>
                    </template>
                </div>

                <div class="text-center">
                    <p class="text-xs text-base-content/40 font-medium uppercase tracking-tighter" x-text="table.capacity + ' SEATS'"></p>
                </div>

                <!-- Hover Actions -->
                <div class="absolute inset-0 bg-primary/80 opacity-0 group-hover:opacity-100 transition-premium flex items-center justify-center translate-y-full group-hover:translate-y-0 p-4">
                    <div class="flex flex-col gap-2 w-full">
                        <button class="btn btn-sm bg-white text-primary hover:bg-white hover:scale-105 border-none rounded-xl font-bold">Open Order</button>
                        <button class="btn btn-sm btn-ghost text-white hover:bg-white/10 rounded-xl">View Details</button>
                    </div>
                </div>
            </div>
        </template>

        <!-- Add Table Placeholder -->
        <button class="bg-base-200/50 rounded-[2rem] border-2 border-dashed border-base-300 flex flex-col items-center justify-center gap-3 p-6 text-base-content/30 hover:text-primary hover:border-primary/50 hover:bg-primary/5 transition-premium group">
            <div class="w-12 h-12 rounded-full bg-base-300 border border-base-300 flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors">
                <i data-lucide="plus" class="size-6"></i>
            </div>
            <span class="text-xs font-bold">ADD NEW TABLE</span>
        </button>
    </div>

</div>

<style>
    @keyframes pulse-soft {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
        100% { transform: scale(1); opacity: 1; }
    }
    .status-pulse {
        animation: pulse-soft 2s infinite ease-in-out;
    }
</style>
{% endblock %}
