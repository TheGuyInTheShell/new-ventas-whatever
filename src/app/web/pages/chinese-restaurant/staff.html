{% extends "layouts/panel.html" %}

{% block content %}
<div x-data="chineseRestaurantStaff({{ staff | tojson }})" class="space-y-6">

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
            <h1 class="text-2xl font-bold text-base-content">Staff Directory</h1>
            <p class="text-sm text-base-content/60">Manage your team and their active status</p>
        </div>
        <button class="btn btn-primary btn-sm rounded-xl">
            <i data-lucide="user-plus" class="size-4 mr-2"></i>
            Hire Member
        </button>
    </div>

    <!-- Staff Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <template x-for="member in staff" :key="member.id">
            <div class="bg-base-100 rounded-[2.5rem] border border-base-300 p-8 flex flex-col items-center text-center transition-premium hover:shadow-2xl hover:shadow-primary/5 hover:border-primary/20 group relative overflow-hidden">
                
                <!-- Background decoration -->
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/5 rounded-full group-hover:scale-150 transition-transform duration-700"></div>

                <div class="relative mb-6">
                    <div class="avatar">
                        <div class="w-24 h-24 rounded-[2rem] ring ring-primary ring-offset-base-100 ring-offset-4 group-hover:ring-offset-8 transition-all duration-500 overflow-hidden shadow-xl shadow-primary/20">
                            <img :src="member.avatar" :alt="member.name" />
                        </div>
                    </div>
                    <div class="absolute -bottom-2 -right-2 w-8 h-8 rounded-2xl bg-base-100 border border-base-300 flex items-center justify-center shadow-lg group-hover:translate-x-1 group-hover:translate-y-1 transition-transform">
                        <template x-if="member.status === 'Active'">
                            <span class="w-3 h-3 rounded-full bg-success"></span>
                        </template>
                        <template x-if="member.status !== 'Active'">
                            <span class="w-3 h-3 rounded-full bg-warning"></span>
                        </template>
                    </div>
                </div>

                <div class="space-y-1 relative">
                    <h3 class="text-lg font-black text-base-content group-hover:text-primary transition-colors" x-text="member.name"></h3>
                    <p class="text-[10px] uppercase tracking-widest font-bold text-base-content/40" x-text="member.role"></p>
                </div>

                <div class="mt-6 flex flex-wrap justify-center gap-2 relative">
                    <span class="badge badge-sm rounded-lg border-none py-3 px-4 font-bold" :class="getStatusClass(member.status)" x-text="member.status"></span>
                    <button class="btn btn-ghost btn-square btn-sm rounded-xl">
                        <i data-lucide="mail" class="size-4 text-base-content/40"></i>
                    </button>
                    <button class="btn btn-ghost btn-square btn-sm rounded-xl">
                        <i data-lucide="phone" class="size-4 text-base-content/40"></i>
                    </button>
                </div>

                <div class="mt-8 pt-8 border-t border-base-300 w-full grid grid-cols-2 gap-4 relative">
                    <div class="text-left">
                        <p class="text-[9px] font-bold text-base-content/30 uppercase">Orders</p>
                        <p class="text-sm font-black text-base-content">48</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] font-bold text-base-content/30 uppercase">Rating</p>
                        <p class="text-sm font-black text-primary">4.9</p>
                    </div>
                </div>
            </div>
        </template>
    </div>

</div>
{% endblock %}
