{% extends "base.html" %}

{% block page %}
<div class="drawer lg:drawer-open">
    <input id="my-drawer-4" type="checkbox" class="drawer-toggle" checked />

    <div class="drawer-content flex flex-col min-h-screen bg-base-100">
        <!-- Top Navbar -->
        <nav
            class="navbar sticky top-0 z-30 w-full bg-base-100/80 backdrop-blur-md border-b border-base-300 px-4 md:px-6 h-16 shrink-0">
            <div class="flex-none">
                <label for="my-drawer-4" aria-label="toggle sidebar"
                    class="btn btn-square btn-ghost text-base-content/60 transition-premium hover:scale-110 active:scale-90">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linejoin="round"
                        stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor" class="size-5">
                        <path d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z">
                        </path>
                        <path d="M9 4v16"></path>
                        <path d="M14 10l2 2l-2 2"></path>
                    </svg>
                </label>
            </div>

            <div class="flex-1 px-4">
                <nav class="hidden sm:flex items-center text-sm font-medium">
                    <span class="text-base-content/60">Dashboard</span>
                    <i data-lucide="chevron-right" class="size-4 mx-2 text-base-content/30"></i>
                    <span class="text-base-content font-bold">Home</span>
                </nav>
            </div>

            <div class="flex-none gap-2">
                <div class="relative hidden sm:block">
                    <input type="text" placeholder="Search..."
                        class="w-64 h-9 pl-9 pr-4 text-xs bg-base-200 border-transparent focus:border-primary focus:ring-0 rounded-lg transition-all text-base-content">
                    <i data-lucide="search"
                        class="absolute left-3 top-1/2 -translate-y-1/2 size-4 text-base-content/40"></i>
                </div>

                <button
                    class="p-2.5 text-base-content/60 hover:bg-base-200 rounded-lg transition-premium hover:scale-110 active:scale-95 relative">
                    <i data-lucide="bell" class="size-5"></i>
                    <span
                        class="absolute top-2 right-2.5 w-2.5 h-2.5 bg-primary rounded-full ring-2 ring-base-100 shadow-sm shadow-primary/40"></span>
                </button>

                <div class="h-6 w-px bg-base-300 mx-1"></div>

                <button
                    class="p-2 md:p-1 flex items-center gap-2 hover:bg-base-200 rounded-lg transition-premium hover:shadow-sm">
                    <img src="https://ui-avatars.com/api/?name=John+Doe&background=00C16A&color=fff"
                        class="w-8 h-8 rounded-lg shadow-sm border border-base-300">
                    <i data-lucide="chevron-down" class="hidden md:block size-4 text-base-content/40"></i>
                </button>
            </div>
        </nav>

        <!-- Page Content -->
        <div class="flex-1 p-4 md:p-6 lg:p-8 overflow-y-auto scroll-smooth">
            <main id="main-content">
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>

    <!-- Sidebar Drawer Side -->
    <div class="drawer-side z-50 is-drawer-close:overflow-visible">
        <label for="my-drawer-4" aria-label="close sidebar" class="drawer-overlay"></label>

        <div
            class="flex flex-col min-h-full bg-base-200 border-r border-base-300 transition-all duration-300 ease-in-out is-drawer-close:w-14 is-drawer-open:w-60">

            <!-- Sidebar Header -->
            <div class="flex items-center h-16 px-3 border-b border-base-300 shrink-0 overflow-hidden">
                <div class="flex items-center gap-3 w-full">
                    <div
                        class="flex items-center justify-center w-8 h-8 rounded-lg bg-primary text-white shadow-lg shadow-primary/20 shrink-0">
                        <i data-lucide="layout-grid" class="size-5"></i>
                    </div>
                    <div class="flex flex-col overflow-hidden is-drawer-close:hidden" x-transition>
                        <span class="text-sm font-bold truncate text-base-content">Acme Finance</span>
                        <span
                            class="text-[10px] text-base-content/50 font-medium uppercase tracking-wider truncate">Owner</span>
                    </div>
                </div>
            </div>

            <!-- Sidebar Content -->
            <div class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-4">

                <!-- Menu cargado dinámicamente según permisos del usuario -->
                <div>
                    {{ menu | safe }}
                </div>
            </div>

            <!-- Sidebar Footer -->
            <div class="p-2 border-t border-base-300 shrink-0">
                <button
                    class="flex items-center w-full gap-3 p-1 rounded-xl hover:bg-base-300 transition-colors overflow-hidden group is-drawer-close:justify-center is-drawer-close:tooltip is-drawer-close:tooltip-right"
                    data-tip="Profile: John Doe">
                    <div class="relative shrink-0">
                        <img src="https://ui-avatars.com/api/?name=John+Doe&background=00C16A&color=fff"
                            class="w-8 h-8 rounded-full border border-base-100 shadow-sm" alt="User avatar">
                        <div
                            class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-success rounded-full border-2 border-base-200 shadow-xs">
                        </div>
                    </div>
                    <div class="flex flex-col text-left overflow-hidden is-drawer-close:hidden">
                        <span class="text-xs font-bold truncate text-base-content">John Doe</span>
                        <span class="text-[10px] text-base-content/60 truncate">john@financepro.com</span>
                    </div>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // Refresh Icons after dynamic changes or on load
    document.addEventListener('DOMContentLoaded', () => {
        if (window.lucide) {
            lucide.createIcons();
        }
    });
    // For HTMX swap
    document.addEventListener('htmx:afterSettle', () => {
        if (window.lucide) {
            lucide.createIcons();
        }
    });
</script>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.store('dashboard', {
            sidebarCollapsed: !document.getElementById('my-drawer-4').checked,
            notificationsOpen: false,

            syncState() {
                this.sidebarCollapsed = !document.getElementById('my-drawer-4').checked;
            }
        })
    })

    // Sync checkbox changes with store if needed
    document.getElementById('my-drawer-4').addEventListener('change', (e) => {
        if (window.Alpine) {
            Alpine.store('dashboard').syncState();
        }
    });
</script>

<!-- Global Toast Notifications -->
<div x-data="toastComponent()" x-on:notify.window="addNotification({
            variant: $event.detail.variant,
            sender: $event.detail.sender,
            title: $event.detail.title,
            message: $event.detail.message,
        })">

    <div x-on:mouseenter="$dispatch('pause-auto-dismiss')" x-on:mouseleave="$dispatch('resume-auto-dismiss')"
        class="group pointer-events-none fixed inset-x-8 top-0 z-[999] flex max-w-full flex-col gap-2 bg-transparent px-6 py-6 md:bottom-0 md:left-[unset] md:right-0 md:top-[unset] md:max-w-sm">
        <template x-for="(notification, index) in notifications" x-bind:key="notification.id">
            <!-- root div holds all of the notifications  -->
            <div>
                <!-- Info Notification  -->
                <template x-if="notification.variant === 'info'">
                    <div x-data="{ isVisible: false, timeout: null }" x-cloak x-show="isVisible"
                        class="pointer-events-auto relative rounded-box border border-info/30 bg-base-100 text-base-content shadow-xl"
                        role="alert" x-on:pause-auto-dismiss.window="clearTimeout(timeout)"
                        x-on:resume-auto-dismiss.window=" timeout = setTimeout(() => {(isVisible = false), removeNotification(notification.id) }, displayDuration)"
                        x-init="$nextTick(() => { isVisible = true }), (timeout = setTimeout(() => { isVisible = false, removeNotification(notification.id)}, displayDuration))"
                        x-transition:enter="transition duration-300 ease-out" x-transition:enter-end="translate-y-0"
                        x-transition:enter-start="translate-y-8" x-transition:leave="transition duration-300 ease-in"
                        x-transition:leave-end="-translate-x-24 opacity-0 md:translate-x-24"
                        x-transition:leave-start="translate-x-0 opacity-100">
                        <div class="flex w-full items-center gap-2.5 rounded-box p-4 transition-all duration-300">
                            <!-- Icon -->
                            <div class="rounded-full bg-info/10 p-1.5 text-info" aria-hidden="true">
                                <i data-lucide="info" class="size-5"></i>
                            </div>
                            <!-- Title & Message -->
                            <div class="flex flex-col gap-1">
                                <h3 x-cloak x-show="notification.title" class="text-sm font-semibold text-info"
                                    x-text="notification.title"></h3>
                                <p x-cloak x-show="notification.message" class="text-pretty text-sm"
                                    x-text="notification.message"></p>
                            </div>
                            <!--Dismiss Button -->
                            <button type="button" class="ml-auto btn btn-ghost btn-xs btn-circle"
                                aria-label="dismiss notification"
                                x-on:click="(isVisible = false), removeNotification(notification.id)">
                                <i data-lucide="x" class="size-4"></i>
                            </button>
                        </div>
                    </div>
                </template>

                <!-- Success Notification  -->
                <template x-if="notification.variant === 'success'">
                    <div x-data="{ isVisible: false, timeout: null }" x-cloak x-show="isVisible"
                        class="pointer-events-auto relative rounded-box border border-success/30 bg-base-100 text-base-content shadow-xl"
                        role="alert" x-on:pause-auto-dismiss.window="clearTimeout(timeout)"
                        x-on:resume-auto-dismiss.window=" timeout = setTimeout(() => {(isVisible = false), removeNotification(notification.id) }, displayDuration)"
                        x-init="$nextTick(() => { isVisible = true }), (timeout = setTimeout(() => { isVisible = false, removeNotification(notification.id)}, displayDuration))"
                        x-transition:enter="transition duration-300 ease-out" x-transition:enter-end="translate-y-0"
                        x-transition:enter-start="translate-y-8" x-transition:leave="transition duration-300 ease-in"
                        x-transition:leave-end="-translate-x-24 opacity-0 md:translate-x-24"
                        x-transition:leave-start="translate-x-0 opacity-100">
                        <div class="flex w-full items-center gap-2.5 rounded-box p-4 transition-all duration-300">
                            <!-- Icon -->
                            <div class="rounded-full bg-success/10 p-1.5 text-success" aria-hidden="true">
                                <i data-lucide="check-circle-2" class="size-5"></i>
                            </div>
                            <!-- Title & Message -->
                            <div class="flex flex-col gap-1">
                                <h3 x-cloak x-show="notification.title" class="text-sm font-semibold text-success"
                                    x-text="notification.title"></h3>
                                <p x-cloak x-show="notification.message" class="text-pretty text-sm"
                                    x-text="notification.message"></p>
                            </div>
                            <!--Dismiss Button -->
                            <button type="button" class="ml-auto btn btn-ghost btn-xs btn-circle"
                                aria-label="dismiss notification"
                                x-on:click="(isVisible = false), removeNotification(notification.id)">
                                <i data-lucide="x" class="size-4"></i>
                            </button>
                        </div>
                    </div>
                </template>

                <!-- Warning Notification  -->
                <template x-if="notification.variant === 'warning'">
                    <div x-data="{ isVisible: false, timeout: null }" x-cloak x-show="isVisible"
                        class="pointer-events-auto relative rounded-box border border-warning/30 bg-base-100 text-base-content shadow-xl"
                        role="alert" x-on:pause-auto-dismiss.window="clearTimeout(timeout)"
                        x-on:resume-auto-dismiss.window=" timeout = setTimeout(() => {(isVisible = false), removeNotification(notification.id) }, displayDuration)"
                        x-init="$nextTick(() => { isVisible = true }), (timeout = setTimeout(() => { isVisible = false, removeNotification(notification.id)}, displayDuration))"
                        x-transition:enter="transition duration-300 ease-out" x-transition:enter-end="translate-y-0"
                        x-transition:enter-start="translate-y-8" x-transition:leave="transition duration-300 ease-in"
                        x-transition:leave-end="-translate-x-24 opacity-0 md:translate-x-24"
                        x-transition:leave-start="translate-x-0 opacity-100">
                        <div class="flex w-full items-center gap-2.5 rounded-box p-4 transition-all duration-300">
                            <!-- Icon -->
                            <div class="rounded-full bg-warning/10 p-1.5 text-warning" aria-hidden="true">
                                <i data-lucide="alert-triangle" class="size-5"></i>
                            </div>
                            <!-- Title & Message -->
                            <div class="flex flex-col gap-1">
                                <h3 x-cloak x-show="notification.title" class="text-sm font-semibold text-warning"
                                    x-text="notification.title"></h3>
                                <p x-cloak x-show="notification.message" class="text-pretty text-sm"
                                    x-text="notification.message"></p>
                            </div>
                            <!--Dismiss Button -->
                            <button type="button" class="ml-auto btn btn-ghost btn-xs btn-circle"
                                aria-label="dismiss notification"
                                x-on:click="(isVisible = false), removeNotification(notification.id)">
                                <i data-lucide="x" class="size-4"></i>
                            </button>
                        </div>
                    </div>
                </template>

                <!-- Danger Notification  -->
                <template x-if="notification.variant === 'danger' || notification.variant === 'error'">
                    <div x-data="{ isVisible: false, timeout: null }" x-cloak x-show="isVisible"
                        class="pointer-events-auto relative rounded-box border border-error/30 bg-base-100 text-base-content shadow-xl"
                        role="alert" x-on:pause-auto-dismiss.window="clearTimeout(timeout)"
                        x-on:resume-auto-dismiss.window=" timeout = setTimeout(() => {(isVisible = false), removeNotification(notification.id) }, displayDuration)"
                        x-init="$nextTick(() => { isVisible = true }), (timeout = setTimeout(() => { isVisible = false, removeNotification(notification.id)}, displayDuration))"
                        x-transition:enter="transition duration-300 ease-out" x-transition:enter-end="translate-y-0"
                        x-transition:enter-start="translate-y-8" x-transition:leave="transition duration-300 ease-in"
                        x-transition:leave-end="-translate-x-24 opacity-0 md:translate-x-24"
                        x-transition:leave-start="translate-x-0 opacity-100">
                        <div class="flex w-full items-center gap-2.5 rounded-box p-4 transition-all duration-300">
                            <!-- Icon -->
                            <div class="rounded-full bg-error/10 p-1.5 text-error" aria-hidden="true">
                                <i data-lucide="alert-circle" class="size-5"></i>
                            </div>
                            <!-- Title & Message -->
                            <div class="flex flex-col gap-1">
                                <h3 x-cloak x-show="notification.title" class="text-sm font-semibold text-error"
                                    x-text="notification.title"></h3>
                                <p x-cloak x-show="notification.message" class="text-pretty text-sm"
                                    x-text="notification.message"></p>
                            </div>
                            <!--Dismiss Button -->
                            <button type="button" class="ml-auto btn btn-ghost btn-xs btn-circle"
                                aria-label="dismiss notification"
                                x-on:click="(isVisible = false), removeNotification(notification.id)">
                                <i data-lucide="x" class="size-4"></i>
                            </button>
                        </div>
                    </div>
                </template>

                <!-- Message Notification  -->
                <template x-if="notification.variant === 'message'">
                    <div x-data="{ isVisible: false, timeout: null }" x-cloak x-show="isVisible"
                        class="pointer-events-auto relative rounded-box border border-base-300 bg-base-100 text-base-content shadow-xl"
                        role="alert" x-on:pause-auto-dismiss.window="clearTimeout(timeout)"
                        x-on:resume-auto-dismiss.window="timeout = setTimeout(() => { isVisible = false, removeNotification(notification.id) }, displayDuration)"
                        x-init="$nextTick(() => { isVisible = true }), (timeout = setTimeout(() => { isVisible = false, removeNotification(notification.id) }, displayDuration))"
                        x-transition:enter="transition duration-300 ease-out" x-transition:enter-end="translate-y-0"
                        x-transition:enter-start="translate-y-8" x-transition:leave="transition duration-300 ease-in"
                        x-transition:leave-end="-translate-x-24 opacity-0 md:translate-x-24"
                        x-transition:leave-start="translate-x-0 opacity-100">
                        <div
                            class="flex w-full rounded-box items-center gap-2.5 bg-base-200/50 p-4 transition-all duration-300">
                            <div class="flex w-full items-center gap-2.5">
                                <!-- Avatar -->
                                <img x-cloak x-show="notification.sender && notification.sender.avatar"
                                    class="mr-2 size-10 rounded-full object-cover" alt="avatar" aria-hidden="true"
                                    x-bind:src="notification.sender.avatar" />
                                <div class="flex flex-col items-start gap-1">
                                    <!-- Title & Message -->
                                    <h3 x-cloak x-show="notification.sender && notification.sender.name"
                                        class="text-sm font-semibold text-base-content"
                                        x-text="notification.sender.name"></h3>
                                    <p x-cloak x-show="notification.message" class="text-pretty text-sm"
                                        x-text="notification.message"></p>
                                </div>
                            </div>
                            <!-- Dismiss Button -->
                            <button type="button" class="ml-auto btn btn-ghost btn-xs btn-circle"
                                aria-label="dismiss notification"
                                x-on:click="(isVisible = false), removeNotification(notification.id)">
                                <i data-lucide="x" class="size-4"></i>
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </template>
    </div>
</div>
{% endblock %}
