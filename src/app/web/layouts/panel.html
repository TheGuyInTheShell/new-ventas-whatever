{% extends "base.html" %}

{% block page %}
<div x-data="{ showSidebar: false }" class="relative flex w-full flex-col md:flex-row">
    <!-- This allows screen readers to skip the sidebar and go directly to the main content. -->
    <a class="sr-only" href="#main-content">skip to the main content</a>

    <!-- dark overlay for when the sidebar is open on smaller screens  -->
    <div x-cloak x-show="showSidebar" class="fixed inset-0 z-10 bg-surface-dark/10 backdrop-blur-xs md:hidden"
        aria-hidden="true" x-on:click="showSidebar = false" x-transition.opacity></div>

    <nav x-cloak
        class="fixed left-0 z-20 flex h-svh w-60 shrink-0 flex-col border-r border-outline bg-base-100 p-4 transition-transform duration-300 md:w-64 md:translate-x-0 md:relative dark:border-outline-dark dark:bg-neutral-900"
        x-bind:class="showSidebar ? 'translate-x-0' : '-translate-x-60'" aria-label="sidebar navigation">
        <!-- logo  -->
        <a href="/" class="flex items-center gap-3 px-2 mb-6 group">
            <div class="bg-primary p-2 rounded-xl shadow-lg shadow-primary/30 group-hover:rotate-12 transition-transform duration-300">
                <i data-lucide="zap" class="size-6 text-primary-content fill-primary-content"></i>
            </div>
            <span class="text-xl font-black text-base-content tracking-tighter uppercase italic group-hover:text-primary transition-colors">
                Finance<span class="text-primary not-italic font-light">Pro</span>
            </span>
        </a>

        <!-- search  -->
        <div class="relative mb-6">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 size-4 text-base-content/40 transition-colors group-focus-within:text-primary"></i>
            <input type="search"
                class="w-full h-10 border-0 bg-base-200/50 rounded-xl pl-10 text-xs font-bold uppercase tracking-wider focus:ring-2 focus:ring-primary/20 focus:bg-base-200 transition-all placeholder:text-base-content/30"
                name="search" aria-label="Search" placeholder="Quick Search..." />
        </div>

        <!-- sidebar links  -->
        <div class="flex flex-col gap-1.5 overflow-y-auto pb-6 custom-scrollbar">

            <a href="/dashboard"
                class="flex items-center rounded-xl gap-3 px-3 py-2.5 text-sm font-bold transition-all hover:bg-primary/10 hover:text-primary focus-visible:ring-2 focus-visible:ring-primary focus:outline-hidden group shadow-sm bg-base-200/50">
                <i data-lucide="layout-dashboard" class="size-5 shrink-0 transition-colors group-hover:text-primary text-primary"></i>
                <span class="uppercase tracking-widest text-[11px] italic">Dashboard</span>
            </a>

            <div class="text-[10px] font-black text-base-content/30 uppercase tracking-[0.3em] px-3 mt-4 mb-2 italic">Management</div>

            <!-- collapsible item: User Management -->
            <div x-data="{ isExpanded: false }" class="flex flex-col">
                <button type="button" x-on:click="isExpanded = ! isExpanded" id="user-management-btn"
                    class="flex items-center justify-between rounded-xl gap-3 px-3 py-2.5 text-sm font-bold transition-all focus:outline-hidden group"
                    x-bind:class="isExpanded ? 'bg-base-200 text-primary' : 'text-base-content/70 hover:bg-base-200/50 hover:text-base-content'">
                    <i data-lucide="users" class="size-5 shrink-0 group-hover:text-primary transition-colors"></i>
                    <span class="mr-auto text-left uppercase tracking-widest text-[11px] italic">Users</span>
                    <i data-lucide="chevron-down" class="size-4 transition-transform shrink-0 opacity-40"
                        x-bind:class="isExpanded ? 'rotate-180 opacity-100' : 'rotate-0'"></i>
                </button>

                <ul x-cloak x-collapse x-show="isExpanded" class="pl-11 pr-2 flex flex-col gap-1 mt-1 border-l-2 border-base-200 ml-5">
                    <li><a href="#" class="block py-1.5 text-[11px] font-bold uppercase tracking-wider text-base-content/50 hover:text-primary transition-colors italic">Team List</a></li>
                    <li><a href="#" class="block py-1.5 text-[11px] font-bold uppercase tracking-wider text-base-content/50 hover:text-primary transition-colors italic">Permissions</a></li>
                </ul>
            </div>

            <!-- collapsible item: Products -->
            <div x-data="{ isExpanded: false }" class="flex flex-col">
                <button type="button" x-on:click="isExpanded = ! isExpanded" id="products-btn"
                    class="flex items-center justify-between rounded-xl gap-3 px-3 py-2.5 text-sm font-bold transition-all focus:outline-hidden group"
                    x-bind:class="isExpanded ? 'bg-base-200 text-primary' : 'text-base-content/70 hover:bg-base-200/50 hover:text-base-content'">
                    <i data-lucide="package" class="size-5 shrink-0 group-hover:text-primary transition-colors"></i>
                    <span class="mr-auto text-left uppercase tracking-widest text-[11px] italic">Products</span>
                    <i data-lucide="chevron-down" class="size-4 transition-transform shrink-0 opacity-40"
                        x-bind:class="isExpanded ? 'rotate-180 opacity-100' : 'rotate-0'"></i>
                </button>

                <ul x-cloak x-collapse x-show="isExpanded" class="pl-11 pr-2 flex flex-col gap-1 mt-1 border-l-2 border-base-200 ml-5">
                    <li><a href="#" class="block py-1.5 text-[11px] font-bold uppercase tracking-wider text-base-content/50 hover:text-primary transition-colors italic">Inventory</a></li>
                    <li><a href="#" class="block py-1.5 text-[11px] font-bold uppercase tracking-wider text-base-content/50 hover:text-primary transition-colors italic">Categories</a></li>
                </ul>
            </div>

            <div class="text-[10px] font-black text-base-content/30 uppercase tracking-[0.3em] px-3 mt-4 mb-2 italic">System</div>

            <a href="#"
                class="flex items-center rounded-xl gap-3 px-3 py-2.5 text-sm font-bold transition-all text-base-content/70 hover:bg-base-200/50 hover:text-base-content group">
                <i data-lucide="bell" class="size-5 shrink-0 group-hover:text-primary transition-colors"></i>
                <span class="uppercase tracking-widest text-[11px] italic">Notifications</span>
                <span class="badge badge-primary badge-xs ml-auto"></span>
            </a>

            <a href="#"
                class="flex items-center rounded-xl gap-3 px-3 py-2.5 text-sm font-bold transition-all text-base-content/70 hover:bg-base-200/50 hover:text-base-content group">
                <i data-lucide="settings" class="size-5 shrink-0 group-hover:text-primary transition-colors"></i>
                <span class="uppercase tracking-widest text-[11px] italic">Settings</span>
            </a>
        </div>

        <!-- User Profile Section -->
        <div class="mt-auto border-t border-outline pt-4 dark:border-outline-dark">
            <div class="flex items-center gap-3 px-2 py-1 select-none">
                <div class="avatar placeholder">
                    <div class="bg-primary text-primary-content rounded-full w-10 ring ring-primary ring-offset-base-100 ring-offset-2">
                        <span class="text-xl font-bold uppercase">JD</span>
                    </div>
                </div>
                <div class="flex flex-col">
                    <span class="text-sm font-bold text-base-content truncate w-32">John Doe</span>
                    <span class="text-[11px] text-base-content/60 font-medium truncate w-32 tracking-wider">Premium Member</span>
                </div>
                <button class="btn btn-ghost btn-circle btn-sm ml-auto opacity-0 group-hover:opacity-100 transition-opacity">
                    <i data-lucide="more-vertical" class="size-4"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- main content  -->
    <div id="main-content" class="h-svh w-full overflow-y-auto p-4 bg-white dark:bg-neutral-950">
        <!-- Add main content here  -->
        {% block content %}
        {% endblock %}
    </div>

    <button
        class="fixed right-4 top-4 z-20 rounded-full bg-primary p-4 md:hidden text-on-primary dark:bg-primary-dark dark:text-on-primary-dark"
        x-on:click="showSidebar = ! showSidebar">
        <i x-show="showSidebar" data-lucide="x" class="size-5" aria-hidden="true"></i>
        <i x-show="! showSidebar" data-lucide="menu" class="size-5" aria-hidden="true"></i>
        <span class="sr-only">sidebar toggle</span>
    </button>
</div>
{% endblock %}
